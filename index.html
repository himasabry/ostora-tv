<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OSTORA TV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Cairo}
.header{padding:15px;text-align:center;background:#111;font-size:22px;font-weight:bold}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.name{
padding:8px;
text-align:center;
font-size:12px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
}

.player{
position:fixed;
inset:0;
display:none;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:999;
}

video{
width:100%;
}
</style>

</head>

<body>

<div class="header">OSTORA TV</div>

<div class="grid" id="grid"></div>

<div class="player" id="player">
<video id="video" controls autoplay></video>
</div>

<script>

const API_URL = "https://brown-antelope-528999.hostingersite.com/ostora/channels.php";

let hls = null;

// =======================
// LOAD CHANNELS
// =======================
async function loadChannels(){

try {

const res = await fetch(API_URL);
const data = await res.json();

const grid = document.getElementById("grid");
grid.innerHTML = "";

if(!data.items || data.items.length === 0){
grid.innerHTML = "<p style='text-align:center;color:red'>لا توجد قنوات</p>";
return;
}

data.items.forEach(item => {

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<img src="${item.image || ''}">
<div class="name">${item.name || ''}</div>
`;

div.onclick = () => playChannel(item.stream_url);

grid.appendChild(div);

});

} catch (e) {
document.getElementById("grid").innerHTML =
"<p style='color:red;text-align:center'>خطأ في تحميل البيانات</p>";
console.log(e);
}

}

// =======================
// PLAY CHANNEL
// =======================
function playChannel(url){

if(!url){
alert("لا يوجد رابط تشغيل");
return;
}

document.getElementById("player").style.display = "flex";

const video = document.getElementById("video");

const proxyUrl = `/api/proxy?url=${encodeURIComponent(url)}`;

if(Hls.isSupported()){

if(hls) hls.destroy();

hls = new Hls({
enableWorker:true
});

hls.loadSource(proxyUrl);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED, () => {
video.play();
});

}else{
video.src = proxyUrl;
video.play();
}

}

// Close on ESC
document.addEventListener("keydown",(e)=>{
if(e.key==="Escape"){
document.getElementById("player").style.display="none";
document.getElementById("video").pause();
}
});

loadChannels();

</script>

</body>
</html>
